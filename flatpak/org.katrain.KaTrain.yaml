app-id: org.katrain.KaTrain
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: katrain-wrapper

finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --persist=.katrain

modules:
  - name: mtdev
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://gitlab.freedesktop.org/libevdev/mtdev/-/archive/v1.1.7/mtdev-v1.1.7.tar.gz
        sha256: 50f6ed402789219e75ccfe72ab5aa52d21512e376406105566cc693fcd1114dc

  - name: libzip
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DBUILD_TOOLS=OFF
      - -DBUILD_REGRESS=OFF
      - -DBUILD_EXAMPLES=OFF
      - -DBUILD_DOC=OFF
    sources:
      - type: archive
        url: https://github.com/nih-at/libzip/releases/download/v1.10.1/libzip-1.10.1.tar.xz
        sha256: dc3c8d5b4c8bbd09626864f6bcf93de701540f761d76b85d7c7d710f4bd90318

  - name: katrain
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation
          kivy kivymd==0.104.1 ffpyplayer "screeninfo>=0.8.1,<0.9"
          "chardet>=5.2.0,<6" docutils "urllib3>=2.2.2"
      - pip3 install --prefix=/app --no-deps .
      - |
        cat > /app/bin/katrain-wrapper << 'EOF'
        #!/bin/bash
        # Use sdl2 clipboard backend since xclip/xsel are not available in the sandbox
        export KIVY_CLIPBOARD=sdl2
        exec katrain "$@"
        EOF
        chmod +x /app/bin/katrain-wrapper
      - install -Dm644 flatpak/org.katrain.KaTrain.desktop
          /app/share/applications/org.katrain.KaTrain.desktop
      - install -Dm644 flatpak/org.katrain.KaTrain.png
          /app/share/icons/hicolor/256x256/apps/org.katrain.KaTrain.png
      - install -Dm644 flatpak/org.katrain.KaTrain.metainfo.xml
          /app/share/metainfo/org.katrain.KaTrain.metainfo.xml
    sources:
      - type: dir
        path: ..
